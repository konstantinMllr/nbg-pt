spring.application.name=demo

# Neo4j Configurations
spring.neo4j.uri=${NEO4J_URI:bolt://localhost:7687}
spring.neo4j.authentication.username=${NEO4J_USERNAME:neo4j}
spring.neo4j.authentication.password=${NEO4J_PASSWORD:password}

# Llama API Configurations
llama.embedding.url=${LLAMA_EMBEDDING_URL:http://localhost:8082/v1/embeddings}
llama.chat.url=${LLAMA_CHAT_URL:http://localhost:8081/v1/chat/completions}
llama.model.embedding=${LLAMA_MODEL_EMBEDDING:qwen3}
llama.model.chat=${LLAMA_MODEL_CHAT:qwen3}

apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  NEO4J_URI: "bolt://host.minikube.internal:7687"
  LLAMA_EMBEDDING_URL: "http://host.minikube.internal:8082/v1/embeddings"
  LLAMA_CHAT_URL: "http://host.minikube.internal:8081/v1/chat/completions"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: nbg-pt-backend:latest
        imagePullPolicy: Never 
        ports:
        - containerPort: 8095
        env:
        - name: NEO4J_PASSWORD
          value: "schwanzer" 
        envFrom:
        - configMapRef:
            name: backend-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: nbg-pt-frontend:latest
        imagePullPolicy: Never 
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: LoadBalancer 
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 5173
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  labels:
    app: backend
spec:
  type: LoadBalancer 
  selector:
    app: backend
  ports:
    - name: http-backend
      protocol: TCP
      port: 8095
      targetPort: 8095
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend-monitor
  labels:
    release: prometheus 
spec:
  selector:
    matchLabels:
      app: backend
  endpoints:
  - port: http-backend
    path: /actuator/prometheus
    interval: 15s

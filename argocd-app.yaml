apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nbg-pt-gitops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/konstantinMllr/nbg-pt.git'
    targetRevision: main
    path: .
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
